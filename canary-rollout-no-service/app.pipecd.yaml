apiVersion: pipecd.dev/v1beta1
kind: KubernetesApp
spec:
  name: canary-rollout-no-service
  labels:
    env: test
  description: Test canary rollout without service creation
  pipeline:
    stages:
      - name: K8S_CANARY_ROLLOUT
        with:
          replicas: 1
  plugins:
