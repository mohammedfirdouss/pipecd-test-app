apiVersion: pipecd.dev/v1beta1
kind: KubernetesApp
spec:
  name: baseline-clean-with-service
  labels:
    env: test
  description: Test baseline clean removes both deployment and service
  pipeline:
    stages:
      - name: K8S_BASELINE_ROLLOUT
        with:
          replicas: 1
          createService: true
      - name: K8S_BASELINE_CLEAN
  plugins:
    kubernetes_multicluster:
      input:
        manifests:
          - deployment.yaml
          - service.yaml
        kubectlVersion: 1.32.2
      service:
        name: simple
