name: PipeCD

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]
  # Note: issue_comment-triggered workflows must exist on the default branch.
  issue_comment:
    types: [created]

permissions:
  pull-requests: write

jobs:
  plan-preview:
    name: Plan Preview
    runs-on: ubuntu-latest
    if: "github.event_name == 'pull_request'"
    steps:
      - uses: pipe-cd/actions-plan-preview@v1.8.0
        with:
          address: demo.pipecd.dev:443
          api-key: ${{ secrets.PIPECD_API_KEY }}
          token: ${{ secrets.GITHUB_TOKEN }}

  plan-preview-on-comment:
    name: Plan Preview (Manual Trigger)
    runs-on: ubuntu-latest
    if: "github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '/pipecd plan-preview')"
    steps:
      - uses: pipe-cd/actions-plan-preview@v1.8.0
        with:
          address: demo.pipecd.dev:443
          api-key: ${{ secrets.PIPECD_API_KEY }}
          token: ${{ secrets.GITHUB_TOKEN }}
